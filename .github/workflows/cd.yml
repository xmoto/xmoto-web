name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    if: github.event.workflow_run.conclusion == 'success'
    name: Build and push ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            image: xmoto-web-api
            target: api
          - name: site
            image: xmoto-web-site
            target: site
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/xmoto/${{ matrix.image }}:latest
            ghcr.io/xmoto/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  update-image-tags:
    if: github.event.workflow_run.conclusion == 'success'
    name: Update image tags in Argo CD deployment repo
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    steps:
      - uses: actions/checkout@v6
        with:
          repository: xmoto/argocd-deployments
          ssh-key: ${{ secrets.ARGOCD_DEPLOYMENTS_DEPLOY_KEY }}

      - name: Update image tags
        shell: bash
        run: |
          for service in xmoto-web-api xmoto-web-site; do
            for overlay in staging prod; do
              pushd "$service/overlays/$overlay" >/dev/null

              kustomize edit set image \
                ghcr.io/xmoto/$service=ghcr.io/xmoto/$service:${{ github.sha }}

              popd >/dev/null
            done
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No image tag changes to commit"
            exit 0
          fi

          git commit -am "Update images to ${{ github.sha }}"
          git push origin HEAD:main
